[workspace]
name = "launch_ext"
channels = [
  "http://localhost:8000",
  "https://prefix.dev/robostack-kilted",
  "https://prefix.dev/conda-forge",
]
platforms = ["linux-64"]
preview = ["pixi-build"]

[dependencies]
launch_ext = { path = "." }

[package]
name = "launch_ext"
version = "0.0.1"
description = "Some extras for launch tooling."
license = "MIT"
authors = ["Russ Webber <russ.webber@greenroomrobotics.com>"]

[package.build.backend]
name = "pixi-build-ros"
version = "*"

[package.host-dependencies]
python = "*"
hatchling = "*"

[package.run-dependencies]
python = "*"
ros-kilted-launch = "*"
ros-kilted-launch-ros = "*"
ros-kilted-example-interfaces = "*"
ros-kilted-xacro = "*"
psutil = ">=5,<8"
jinja2 = ">=3.1,<4"
gitpython = ">=3.1,<4"
dbus-python = "*"
