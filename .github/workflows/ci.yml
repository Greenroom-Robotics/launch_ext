name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.ros_distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [jazzy, kilted]
    env:
      ROS_DISTRO: ${{ matrix.ros_distro }}

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker compose build dev

      - name: Run tests
        run: docker compose run --rm test

      - name: Collect test results
        if: always()
        run: |
          mkdir -p test-artifacts
          docker compose run --rm --no-deps --entrypoint '' \
            -v "${PWD}/test-artifacts:/out" dev \
            bash -c "cp -r /ros_ws/build /out/build 2>/dev/null || true; \
                     cp -r /ros_ws/log /out/log 2>/dev/null || true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.ros_distro }}
          path: |
            test-artifacts/build/*/pytest.xml
            test-artifacts/log/latest_test/**
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose down -v

  report:
    name: Test report
    needs: build
    if: always()
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts
          pattern: test-results-*

      - name: Publish test report
        uses: EnricoMi/publish-unit-test-result-action@v2.23
        with:
          check_name: Test results
          junit_files: 'test-artifacts/test-results-*/build/*/pytest.xml'
          check_run_annotations: all tests, skipped tests
