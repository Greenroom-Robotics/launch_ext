services:
  dev:
    build:
      context: .
      args:
        ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    image: launch_ext:${ROS_DISTRO:-jazzy}
    container_name: launch_ext
    network_mode: host
    ipc: host
    pid: host
    stdin_open: true
    tty: true
    working_dir: /ros_ws
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_AUTOMATIC_DISCOVERY_RANGE=${ROS_AUTOMATIC_DISCOVERY_RANGE:-LOCALHOST}
    volumes:
      - .:/ros_ws/src/launch_ext
      - /ros_ws/src/launch_ext/build
      - /ros_ws/src/launch_ext/install
      - /ros_ws/src/launch_ext/log
      - build:/ros_ws/build
      - install:/ros_ws/install
      - log:/ros_ws/log
    command: bash

  test:
    extends:
      service: dev
    container_name: launch_ext_test
    tty: false
    stdin_open: false
    volumes:
      - .:/ros_ws/src/launch_ext
      - /ros_ws/src/launch_ext/build
      - /ros_ws/src/launch_ext/install
      - /ros_ws/src/launch_ext/log
      - build:/ros_ws/build
      - install:/ros_ws/install
      - log:/ros_ws/log
    command:
      - bash
      - -ec
      - |
        source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash
        find /ros_ws/src/launch_ext -name __pycache__ -type d -exec rm -rf {} +
        colcon build --symlink-install --event-handlers console_direct+
        source /ros_ws/install/setup.bash
        colcon test --event-handlers console_direct+ --return-code-on-test-failure
        colcon test-result --verbose

volumes:
  build:
  install:
  log:
